[build]
  command = "node node_modules/next/dist/bin/next build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "http://julientest-saas-website.netlify.app/*"
  to     = "https://julientest-saas-website.netlify.app/:splat"
  status = 301
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://identity.netlify.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://*.netlify.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'"
